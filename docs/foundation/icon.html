  <style>
    /* ── Material Symbols exact Figma font settings ──────── */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      font-size: 24px;
      line-height: 1;
      user-select: none;
      display: block;
      flex-shrink: 0;
    }

    /* ── Icon card exact Figma design tokens ───────────────
       bg:     #FFFFFF
       border: 0.667px solid #E5E7EB
       radius: 14px
       shadow: Figma effect_ULZX7A
       pad:    32px 24px
    ──────────────────────────────────────────────────────── */
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px 22px;
      border-radius: 14px;
      border: 0.667px solid #E5E7EB;
      background: #ffffff;
      box-shadow: 0px 1px 2px -1px rgba(0, 0, 0, 0.1),
                  0px 1px 3px 0px rgba(0, 0, 0, 0.1);
      cursor: default;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      min-width: 0;
    }
    .icon-card:hover {
      background: #f0f3ff;
      border-color: #B0B8FF;
      box-shadow: 0px 4px 12px rgba(25, 29, 136, 0.1),
                  0px 1px 3px rgba(0, 0, 0, 0.06);
    }

    /* ── Icon symbol colour ─────────────────────────────────── */
    .icon-sym {
      color: #3c4350;
      transition: color 0.15s ease;
    }
    .icon-card:hover .icon-sym {
      color: #0E165D;
    }

    /* ── Custom SVG icon (WhatsApp not in Material Symbols) ── */
    .icon-custom-svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: block;
      color: #3c4350;
      transition: color 0.15s ease;
    }
    .icon-card:hover .icon-custom-svg {
      color: #0E165D;
    }

    /* ── Icon name Figma label: 16px gap from icon ─────────── */
    .icon-name {
      margin-top: 14px;
      font-size: 10.5px;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-weight: 400;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
      word-break: break-all;
      overflow-wrap: anywhere;
      max-width: 100%;
      transition: color 0.15s ease;
    }
    .icon-card:hover .icon-name {
      color: #0E165D;
    }

    /* ── Sticky search bar ──────────────────────────────────── */
    .icon-search-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #ffffff;
      border-bottom: 1px solid rgba(217, 217, 217, 0.6);
    }

    /* ── Search input focus ring ────────────────────────────── */
    #icon-search:focus {
      border-color: rgba(25, 29, 136, 0.4);
      box-shadow: 0 0 0 3px rgba(25, 29, 136, 0.08);
      outline: 2px solid #0E165D;
      outline-offset: 2px;
    }
    .icon-card:focus-visible {
      outline: 2px solid #0E165D;
      outline-offset: 2px;
    }

    /* ── Empty state ────────────────────────────────────────── */
    #empty-state {
      display: none;
    }
    #empty-state.show {
      display: flex;
    }

    /* ── Hidden card ────────────────────────────────────────── */
    .icon-card.hidden-card {
      display: none;
    }
  </style>

    // 'workspaces_filled' has no _filled variant in Symbols Outlined;
    // the FILL=0 variant is just 'workspaces'.

  // ════════════════════════════════════════════════════════════
  //  NORMALISE + DEDUPLICATE
  // ════════════════════════════════════════════════════════════
  var seen  = {};
  var ICONS = [];
  RAW.forEach(function (x) {
    var name  = typeof x === 'string' ? x : x.n;
    var glyph = typeof x === 'string' ? x : x.g;
    if (seen[name]) return;
    seen[name] = true;
    // Apply glyph fixes for known bad-rendering icons
    if (GLYPH_FIXES[name]) glyph = GLYPH_FIXES[name];
    ICONS.push({
      name:   name,
      glyph:  glyph,
      search: (name + ' ' + glyph).toLowerCase().replace(/[_\s-]+/g, ' '),
    });
  });

  // ════════════════════════════════════════════════════════════
  //  RENDER
  // ════════════════════════════════════════════════════════════
  var gridEl   = document.getElementById('icon-grid');
  var emptyEl  = document.getElementById('empty-state');
  var countEl  = document.getElementById('icon-count');
  var inputEl  = document.getElementById('icon-search');
  var clearBtn = document.getElementById('search-clear');
  var cardEls  = []; // reference cache for fast search

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function buildIconHtml(icon) {
    if (icon.glyph === '__whatsapp__') {
      return WHATSAPP_SVG;
    }
    return '<span class="material-symbols-outlined icon-sym" aria-hidden="true">'
      + icon.glyph + '</span>';
  }

  function buildGrid() {
    var frag = document.createDocumentFragment();
    ICONS.forEach(function (icon) {
      var card = document.createElement('div');
      card.className = 'icon-card';
      card.setAttribute('role', 'listitem');
      card.setAttribute('data-s', icon.search);
      card.innerHTML =
        buildIconHtml(icon) +
        '<p class="icon-name">' + escapeHtml(icon.name) + '</p>';
      cardEls.push(card);
      frag.appendChild(card);
    });
    gridEl.appendChild(frag);
    countEl.textContent = ICONS.length.toLocaleString();
  }

  // ════════════════════════════════════════════════════════════
  //  SEARCH
  // ════════════════════════════════════════════════════════════
  var debounceTimer;

  function runSearch(raw) {
    var q = raw.trim().toLowerCase().replace(/[\s_-]+/g, ' ');
    var visible = 0;
    cardEls.forEach(function (card) {
      var haystack = card.getAttribute('data-s');
      var show     = !q || haystack.includes(q) || haystack.replace(/ /g, '_').includes(q.replace(/ /g, '_'));
      card.classList.toggle('hidden-card', !show);
      if (show) visible++;
    });
    countEl.textContent = visible.toLocaleString();
    emptyEl.classList.toggle('show', visible === 0);
    clearBtn.classList.toggle('hidden', raw.length === 0);
  }

  function clearSearch() {
    inputEl.value = '';
    runSearch('');
    inputEl.focus();
  }

  // ════════════════════════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════════════════════════
  document.addEventListener('DOMContentLoaded', function () {
    buildGrid();

    inputEl.addEventListener('input', function () {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function () { runSearch(inputEl.value); }, 80);
    });

    clearBtn.addEventListener('click', clearSearch);

    // Keyboard shortcuts
    document.addEventListener('keydown', function (e) {
      var tag = document.activeElement.tagName;
      if (e.key === '/' && tag !== 'INPUT' && tag !== 'TEXTAREA') {
        e.preventDefault();
        inputEl.focus();
        inputEl.select();
      }
      if (e.key === 'Escape' && document.activeElement === inputEl) {
        clearSearch();
      }
    });

    // Mobile navigation
    var mBtn   = document.getElementById('mobile-menu-btn');
    var mClose = document.getElementById('mobile-drawer-close');
    var mOver  = document.getElementById('mobile-overlay');
    var mDraw  = document.getElementById('mobile-drawer');
    if (mBtn && mDraw) {
      function openMob()  { mDraw.classList.remove('-translate-x-full'); mOver.classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
      function closeMob() { mDraw.classList.add('-translate-x-full');    mOver.classList.add('hidden');    document.body.style.overflow = ''; }
      mBtn.addEventListener('click', openMob);
      if (mClose) mClose.addEventListener('click', closeMob);
      if (mOver)  mOver.addEventListener('click', closeMob);
    }
  });
  </script>
