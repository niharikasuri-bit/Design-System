<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forms · DIGIT Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script>window.tailwind = { config: {theme:{extend:{fontFamily:{sans:['DM Sans','system-ui','sans-serif'],mono:['JetBrains Mono','Consolas','monospace']}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../assets/css/styles.css"/>
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes shimmer { 0%{opacity:.4} 50%{opacity:1} 100%{opacity:.4} }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
    @keyframes pulse-ring { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(1.6);opacity:0} }
    .float { animation: float 4s ease-in-out infinite; }
    .shimmer { animation: shimmer 2s ease-in-out infinite; }
    .slide-up { animation: slideUp .5s ease-out both; }
    .slide-up-2 { animation: slideUp .5s .1s ease-out both; }
    .slide-up-3 { animation: slideUp .5s .2s ease-out both; }
    .slide-up-4 { animation: slideUp .5s .3s ease-out both; }
    .pulse-ring::before {
      content:''; position:absolute; inset:-4px; border-radius:50%;
      border:2px solid #0E165D; animation: pulse-ring 2s ease-out infinite;
    }
    /* Skeleton field strips */
    .skel { background:linear-gradient(90deg,#E5E7EB 25%,#F4F5F7 50%,#E5E7EB 75%); background-size:200% 100%; animation:shimmer 1.5s ease-in-out infinite; border-radius:6px; }
  </style>
  <script>
    window.DIGIT_ROOT='../../';
    window.DIGIT_PAGE={section:'patterns',page:'form',title:'Forms',breadcrumb:['Patterns','Forms']};
    
  </script>
</head>
<body class="bg-white font-sans antialiased">


<!-- Left sidebar -->
<div class="flex min-h-screen">
  <aside class="hidden lg:block w-64 xl:w-72 shrink-0 fixed top-0 left-0 h-screen border-r border-[#E5E7EB] bg-white z-30">
    <div id="sidebar-content" class="h-full overflow-y-auto sidebar-scroll"></div>
  </aside>

  <!-- Main -->
  <main id="main-content" class="flex-1 min-w-0 lg:ml-64 xl:ml-72 py-6 px-8">
    <div class="max-w-5xl mx-auto">

      <div class="flex flex-col items-center justify-center text-center min-h-screen">

        <!-- Animated form illustration -->
        <div class="float mb-4">
          <div class="bg-white rounded-2xl border border-[#E5E7EB] p-3 text-left" style="width:200px;box-shadow:0 8px 24px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04)">
            <!-- Form header bar -->
            <div class="flex items-center gap-2 mb-4 pb-3 border-b border-[#E5E7EB]">
              <div class="w-2 h-2 rounded-full bg-[#0E165D]"></div>
              <div class="h-2 rounded-full bg-[#E5E7EB] w-20"></div>
            </div>
            <!-- Field 1: filled -->
            <div class="slide-up mb-3">
              <div class="h-1.5 rounded-full bg-[#D1D5DB] w-14 mb-1.5"></div>
              <div class="h-9 rounded-lg bg-[#F4F5F7] border border-[#E5E7EB] flex items-center px-3">
                <div class="h-1.5 rounded-full bg-[#9CA3AF] w-20"></div>
              </div>
            </div>
            <!-- Field 2: focused/active -->
            <div class="slide-up-2 mb-3">
              <div class="h-1.5 rounded-full bg-[#0E165D] w-10 mb-1.5 opacity-70"></div>
              <div class="h-9 rounded-lg bg-white border-2 border-[#0E165D] flex items-center gap-1 px-3" style="box-shadow:0 0 0 3px rgba(25,29,136,.10)">
                <div class="h-1.5 rounded-full bg-[#0E165D] w-16 opacity-50"></div>
                <div class="w-0.5 h-4 bg-[#0E165D] shimmer ml-0.5"></div>
              </div>
            </div>
            <!-- Field 3: skeleton loading -->
            <div class="slide-up-3 mb-4">
              <div class="h-1.5 rounded-full bg-[#D1D5DB] w-16 mb-1.5"></div>
              <div class="h-9 rounded-lg skel"></div>
            </div>
            <!-- Submit button -->
            <div class="slide-up-4 h-9 rounded-lg bg-[#0E165D]"></div>
          </div>
        </div>

        <!-- Coming Soon badge -->
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[12px] font-bold tracking-[.12em] uppercase bg-[#EEF1FF] text-[#0E165D] border border-[#C7D2FE] mb-3">
          <span class="w-1.5 h-1.5 rounded-full bg-[#0E165D]"></span>
          Documentation coming soon
        </span>

        <!-- Heading -->
        <h1 id="form" class="text-[36px] font-bold text-[#0E165D] tracking-[-0.022em] leading-[1.18] mb-4" style="font-family: 'DM Sans', sans-serif;">
          Forms
        </h1>

      </div>
    </div>
  </main>
</div>

<script src="../../assets/js/config.js"></script>
<script src="../../assets/js/theme.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script src="../../assets/js/search.js"></script>
<script src="../../assets/js/app.js"></script>
</body>
</html>
